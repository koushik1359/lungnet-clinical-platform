name: Deploy LungNet to Azure Container Apps

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'data/**'
      - 'mlruns/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-platform

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true # Crucial for our 343MB model file

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          containerAppName: lungnet-app
          resourceGroup: Clinical-AI-Resources
          containerAppEnvironment: Clinical-AI-Env
          targetPort: 8000
